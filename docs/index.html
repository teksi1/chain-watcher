<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0d1215">
    <meta name="description" content="Unbroken Valkyries Chain Watcher">
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'none'; object-src 'none'; frame-src https://script.google.com https://*.googleusercontent.com; style-src 'self'; script-src 'self'; img-src 'self' data:;"
    >
    <title>Unbroken Valkyries — Chain Watcher</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main id="setup" class="setup-card hidden" aria-live="polite">
      <div class="monogram" aria-hidden="true">UV</div>
      <p class="eyebrow">CHAIN WATCHER</p>
      <h1>GitHub Pages setup required</h1>
      <p>Replace <code>PASTE_APPS_SCRIPT_EXEC_URL_HERE</code> in <code>docs/config.js</code> with the deployed Apps Script <code>/exec</code> URL.</p>
      <p>In Chain Watcher Admin settings, set <strong>GitHub Pages origin</strong> to:</p>
      <code id="pages-origin" class="origin"></code>
    </main>

    <div id="loader" class="loader" role="status">
      <div class="monogram" aria-hidden="true">UV</div>
      <span>Opening Chain Watcher…</span>
    </div>

    <iframe
      id="chain-watcher"
      class="app-frame hidden"
      title="Unbroken Valkyries Chain Watcher"
      referrerpolicy="strict-origin-when-cross-origin"
      allow="clipboard-write"
      scrolling="no"
    ></iframe>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
